<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            margin-top: 20%;
            position:relative;
            left: -300px;
            animation: cycle 12s infinite linear;
            perspective: 1000px;
        }
        @keyframes cycle{
            from {transform: translateX(-300px);}
            to{transform: translateX(1550px);}
        }
        hr{
            border: 1px solid;
        }
    </style>
</head>
<body>
    
    <img src="b.jpg" height="50px" width="50px">
    <hr>
    
    
</body>
</html>
